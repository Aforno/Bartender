name: Bug report
description: Report reproducible incorrect behavior
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, private prompts, or personal data.
  - type: input
    id: version
    attributes:
      label: Bar Tender revision or version
      placeholder: Commit SHA or app version
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: macOS 26.0
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - Not provider-related
        - Codex
        - Claude
        - Grok
        - Multiple providers
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide the smallest safe reproduction.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add sanitized logs or screenshots if useful.
