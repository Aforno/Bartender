name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  signed-release:
    name: Sign, notarize, staple, verify, and publish
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6

      - name: Require tag to match VERSION
        run: test "$GITHUB_REF_NAME" = "v$(tr -d '[:space:]' < VERSION)"

      - name: Import Developer ID identity and notarization key
        env:
          CERTIFICATE_BASE64: ${{ secrets.DEVELOPER_ID_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.RELEASE_KEYCHAIN_PASSWORD }}
          NOTARY_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          test -n "$CERTIFICATE_BASE64"
          test -n "$CERTIFICATE_PASSWORD"
          test -n "$KEYCHAIN_PASSWORD"
          test -n "$NOTARY_KEY_BASE64"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          KEYCHAIN_PATH="$RUNNER_TEMP/bartender-release.keychain-db"
          printf '%s' "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          printf '%s' "$NOTARY_KEY_BASE64" | base64 --decode > "$NOTARY_KEY_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          printf 'BARTENDER_NOTARY_KEY_PATH=%s\n' "$NOTARY_KEY_PATH" >> "$GITHUB_ENV"
          printf 'BARTENDER_RELEASE_KEYCHAIN=%s\n' "$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build signed and notarized universal release
        env:
          BARTENDER_SIGNING_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          BARTENDER_NOTARY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          BARTENDER_NOTARY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: ./script/package_release.sh --arch universal

      - name: Enforce distribution signature, Gatekeeper, and staples
        run: ./script/verify_release.sh --distribution --app dist/release/BarTender.app --dmg "dist/release/BarTender-$(tr -d '[:space:]' < VERSION).dmg"

      - name: Mount, copy, and launch the notarized DMG
        run: ./script/install_smoke_test.sh "dist/release/BarTender-$(tr -d '[:space:]' < VERSION).dmg"

      - name: Publish immutable release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          gh release create "$GITHUB_REF_NAME" \
            "dist/release/BarTender-$VERSION.zip" \
            "dist/release/BarTender-$VERSION.dmg" \
            "dist/release/SHA256SUMS.txt" \
            --verify-tag \
            --title "Bar Tender $VERSION" \
            --notes-file RELEASE_NOTES.md

      - name: Remove ephemeral signing material
        if: always()
        run: |
          if [ -n "${BARTENDER_RELEASE_KEYCHAIN:-}" ]; then
            security delete-keychain "$BARTENDER_RELEASE_KEYCHAIN" || true
          fi
          rm -f "${BARTENDER_NOTARY_KEY_PATH:-}" "$RUNNER_TEMP/developer-id.p12"
