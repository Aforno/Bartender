name: Release (ad-hoc)

# Ad-hoc distribution path for this branch only. Does not require a paid Apple
# Developer Program membership. Artifacts are not Developer ID signed or notarized.
# Users must bypass Gatekeeper on first launch. See RELEASE_NOTES.md.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-adhoc-${{ github.ref }}
  cancel-in-progress: false

jobs:
  adhoc-release:
    name: Package ad-hoc universal release and publish
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Check out tagged source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Require tag to match VERSION
        run: test "$GITHUB_REF_NAME" = "v$(tr -d '[:space:]' < VERSION)"

      - name: Build ad-hoc universal release
        run: ./script/package_release.sh --adhoc --skip-notarization --arch universal

      - name: Verify ad-hoc package integrity
        run: ./script/verify_release.sh --app dist/release/BarTender.app --dmg "dist/release/BarTender-$(tr -d '[:space:]' < VERSION).dmg"

      - name: Mount, copy, and launch the DMG
        run: ./script/install_smoke_test.sh "dist/release/BarTender-$(tr -d '[:space:]' < VERSION).dmg"

      - name: Publish prerelease assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="$(tr -d '[:space:]' < VERSION)"
          gh release create "$GITHUB_REF_NAME" \
            "dist/release/BarTender-$VERSION.zip" \
            "dist/release/BarTender-$VERSION.dmg" \
            "dist/release/SHA256SUMS.txt" \
            --verify-tag \
            --prerelease \
            --title "Bar Tender $VERSION (ad-hoc)" \
            --notes-file RELEASE_NOTES.md
